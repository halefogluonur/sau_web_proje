<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap | Onur Halefoğlu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="tasarım.css">
    <style>
        body { background: linear-gradient(135deg, #0c1b33 0%, #1a3a6b 50%, #c62828 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="card login-card shadow-lg">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Sistem Girişi</h2>
            <p class="text-muted small">Öğrenci bilgilerinizle giriş yapın</p>
        </div>

        <div id="hataMesaji" class="alert alert-danger d-none" role="alert"></div>

        <form action="kontrol.php" method="POST" onsubmit="return validateForm()">
            <div class="mb-3">
                <label class="form-label">E-posta</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="b251210073@sakarya.edu.tr">
            </div>
            <div class="mb-3">
                <label class="form-label">Şifre</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="b251210073">
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
                <a href="index.html" class="btn btn-outline-secondary btn-sm">Ana Sayfaya Dön</a>
            </div>
        </form>
    </div>

    <script>
        function validateForm() {
            const email = document.getElementById('email').value.trim();
            const sifre = document.getElementById('password').value.trim();
            const hata = document.getElementById('hataMesaji');

            if (email === '' || sifre === '') {
                hata.textContent = 'E-posta ve şifre alanları boş bırakılamaz!';
                hata.classList.remove('d-none');
                return false;
            }

            if (!email.includes('@')) {
                hata.textContent = 'Geçerli bir e-posta adresi giriniz!';
                hata.classList.remove('d-none');
                return false;
            }

            hata.classList.add('d-none');
            return true;
        }

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('error') === '1') {
                document.getElementById('hataMesaji').textContent = 'E-posta veya şifre hatalı!';
                document.getElementById('hataMesaji').classList.remove('d-none');
            }
        };
    </script>
</body>
</html>
