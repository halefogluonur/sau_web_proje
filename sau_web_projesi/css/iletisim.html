    <main class="container my-5" id="app">
        <h2 class="text-center mb-4">İletişim Formu</h2>

        <form id="contactForm" action="gonder.php" method="POST" class="shadow p-4 rounded bg-light">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Adınız</label>
                    <input type="text" class="form-control" v-model="form.ad" id="ad" name="ad">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Soyadınız</label>
                    <input type="text" class="form-control" v-model="form.soyad" id="soyad" name="soyad">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">E-posta</label>
                <input type="email" class="form-control" v-model="form.email" id="email" name="email">
            </div>

            <div class="mb-3">
                <label class="form-label">Telefon</label>
                <input type="number" class="form-control" v-model="form.tel" id="tel" name="tel" placeholder="05xxxxxxxxx">
            </div>

            <div class="mb-3">
            <label class="form-label">Form Onay Şifresi</label>
            <input type="password" class="form-control" v-model="form.sifre" id="password" name="password">
            </div>

            <div class="mb-3">
                <label class="form-label">Cinsiyet</label><br>
                <input type="radio" v-model="form.cinsiyet" name="cinsiyet" value="Erkek"> Erkek
                <input type="radio" v-model="form.cinsiyet" name="cinsiyet" value="Kadın" class="ms-3"> Kadın
            </div>

            <div class="mb-3">
                <label class="form-label">Mesajınız</label>
                <textarea class="form-control" v-model="form.mesaj" id="mesaj" name="mesaj" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">İlgi Duyduğunuz Evren</label>
                <select class="form-select" v-model="form.evren" name="evren">
                    <option value="">Seçiniz...</option>
                    <option value="got">Game of Thrones</option>
                    <option value="hp">Harry Potter</option>
                    <option value="gibi">Gibi</option>
                    <option value="lotr">Yüzüklerin Efendisi</option>
                    <option value="rdr">Red Dead Redemption</option>
                    <option value="valorant">Valorant</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Hobileriniz</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" v-model="form.hobiler" value="Oyun" name="hobiler[]">
                    <label class="form-check-label">Oyun</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" v-model="form.hobiler" value="Kodlama" name="hobiler[]">
                    <label class="form-check-label">Kodlama</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" v-model="form.hobiler" value="Spor" name="hobiler[]">
                    <label class="form-check-label">Spor</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" v-model="form.hobiler" value="Film&Dizi" name="hobiler[]">
                    <label class="form-check-label">Film&Dizi</label>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Doğum Tarihiniz</label>
                    <input type="date" class="form-control" v-model="form.tarih" name="tarih">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Profil Fotoğrafı (Opsiyonel)</label>
                    <input type="file" class="form-control" name="dosya">
                </div>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                <button type="button" class="btn btn-primary" onclick="validateJS()">JS ile Denetle</button>
                <button type="button" class="btn btn-success" @click="validateVue">Vue.js ile Denetle</button>
                <button type="reset" class="btn btn-danger">Temizle</button>
            </div>
        </form>
    </main>
